name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.4.1)'
        required: true
  workflow_call:
    inputs:
      tag:
        type: string
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          # For workflow_call, github.event_name is inherited from the caller's
          # event (e.g. 'push') rather than 'workflow_call' — so we can't rely
          # on event_name to decide. Check if inputs.tag was supplied instead.
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          VER="${{ steps.tag.outputs.value }}"
          VER="${VER#v}"
          if [ "$PKG" != "$VER" ]; then
            echo "ERROR: package.json version ($PKG) != tag ${{ steps.tag.outputs.value }}"
            exit 1
          fi

      - run: npm run compile
      - run: npm test
      - run: npm run package

      - name: Create or update GitHub Release
        run: |
          if gh release view "${{ steps.tag.outputs.value }}" > /dev/null 2>&1; then
            gh release upload "${{ steps.tag.outputs.value }}" *.vsix --clobber
          else
            gh release create "${{ steps.tag.outputs.value }}" *.vsix \
              --title "Canopy Skills ${{ steps.tag.outputs.value }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
