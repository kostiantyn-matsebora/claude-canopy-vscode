name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.4.1)'
        required: true
  workflow_call:
    inputs:
      tag:
        type: string
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    # id-token + attestations are required by actions/attest-build-provenance
    # to write a Sigstore-signed provenance record into GitHub Attestations.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          # For workflow_call, github.event_name is inherited from the caller's
          # event (e.g. 'push') rather than 'workflow_call' — so we can't rely
          # on event_name to decide. Check if inputs.tag was supplied instead.
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          VER="${{ steps.tag.outputs.value }}"
          VER="${VER#v}"
          if [ "$PKG" != "$VER" ]; then
            echo "ERROR: package.json version ($PKG) != tag ${{ steps.tag.outputs.value }}"
            exit 1
          fi

      - run: npm run compile
      - run: npm test
      - run: npm run package

      - name: Locate packaged .vsix
        id: vsix
        run: |
          VSIX=$(ls -1 *.vsix | head -1)
          if [ -z "$VSIX" ]; then
            echo "::error::No .vsix found after npm run package"
            exit 1
          fi
          echo "path=$VSIX" >> "$GITHUB_OUTPUT"
          sha256sum "$VSIX"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.vsix.outputs.path }}

      - name: Create or update GitHub Release
        run: |
          set -euo pipefail
          VSIX="${{ steps.vsix.outputs.path }}"
          TAG="${{ steps.tag.outputs.value }}"
          # Build a footer that points consumers at the verification commands.
          FOOTER=$(cat <<EOF

          ---

          ### Verifying this release

          \`\`\`
          # Verify the signed tag
          git verify-tag $TAG

          # Verify SLSA build provenance for the .vsix
          gh attestation verify $VSIX --owner kostiantyn-matsebora
          \`\`\`
          EOF
          )

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
            # Append the footer to existing notes
            CUR=$(gh release view "$TAG" --json body --jq .body)
            printf '%s\n%s' "$CUR" "$FOOTER" | gh release edit "$TAG" --notes-file -
          else
            gh release create "$TAG" "$VSIX" \
              --title "Canopy Skills $TAG" \
              --generate-notes \
              --notes-start-tag "$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)"
            # Append verification footer
            CUR=$(gh release view "$TAG" --json body --jq .body)
            printf '%s\n%s' "$CUR" "$FOOTER" | gh release edit "$TAG" --notes-file -
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath ${{ steps.vsix.outputs.path }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
