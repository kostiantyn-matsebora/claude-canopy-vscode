name: Feature request
description: Suggest a framework improvement, new primitive, or documentation enhancement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you want and how it would work.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or constraints
      description: Backwards compatibility, complexity, setup impact, or other concerns.
  - type: textarea
    id: examples
    attributes:
      label: Example usage
      description: Show how the feature would look in a skill, ops file, or setup flow.
